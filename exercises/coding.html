<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophers -- Coding Lab</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --surface3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --orange: #f0883e;
  --red: #f85149;
  --purple: #d2a8ff;
  --yellow: #e3b341;
  --cyan: #79c0ff;
  --font: 'Segoe UI', system-ui, sans-serif;
  --mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Source Code Pro', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; display: flex; min-height: 100vh; }

/* ── Nav ── */
nav {
  width: 300px; min-width: 300px;
  background: var(--surface); border-right: 1px solid var(--border);
  position: fixed; top: 0; left: 0; bottom: 0;
  overflow-y: auto; z-index: 100; transition: transform .3s;
  display: flex; flex-direction: column;
}
nav .logo { padding: 20px; border-bottom: 1px solid var(--border); }
nav .logo h1 { font-size: 15px; color: var(--accent); letter-spacing: .3px; }
nav .logo p { font-size: 12px; color: var(--text2); margin-top: 2px; }
nav .progress-wrap { padding: 12px 20px; }
nav .progress-bar { background: var(--border); border-radius: 4px; height: 5px; overflow: hidden; }
nav .progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s; width: 0%; }
nav .progress-label { font-size: 11px; color: var(--text2); margin-top: 4px; }
nav ul { list-style: none; flex: 1; overflow-y: auto; padding-bottom: 40px; }
nav li { border-bottom: 1px solid var(--border); }
nav li a {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; color: var(--text2); text-decoration: none;
  font-size: 13px; transition: all .15s; border-left: 3px solid transparent;
}
nav li a:hover { background: var(--surface2); color: var(--text); }
nav li a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,.06); }
nav li a .step-num {
  background: var(--surface3); color: var(--text2);
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
nav li a .step-num.done { background: var(--green); color: #fff; }
nav li a .step-title { flex: 1; }
nav li a .diff {
  font-size: 10px; padding: 1px 7px; border-radius: 8px; font-weight: 600;
}
nav li a .diff.S1 { background: rgba(63,185,80,.15); color: var(--green); }
nav li a .diff.S2 { background: rgba(240,136,62,.12); color: var(--orange); }
nav li a .diff.S3 { background: rgba(248,81,73,.12); color: var(--red); }

.menu-btn {
  display: none; position: fixed; top: 10px; left: 10px; z-index: 200;
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  width: 38px; height: 38px; border-radius: 8px; font-size: 18px; cursor: pointer;
}

/* ── Main ── */
main { margin-left: 300px; flex: 1; padding: 0; }

.exercise { display: none; animation: fadeIn .25s; }
.exercise.active { display: flex; flex-direction: column; min-height: 100vh; }
@keyframes fadeIn { from { opacity: 0; } }

/* ── Top: Description ── */
.exercise-top {
  padding: 32px 40px;
  border-bottom: 1px solid var(--border);
  max-width: 900px;
}
.exercise-top .breadcrumb { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.exercise-top h2 { font-size: 24px; margin-bottom: 12px; }
.exercise-top h2 .ex-num { color: var(--accent); font-weight: 400; }
.exercise-top .objective {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 18px;
  font-size: 14px;
  margin-bottom: 16px;
}
.exercise-top .objective b { color: var(--green); }
.exercise-top .desc { font-size: 14px; color: var(--text); }
.exercise-top .desc p { margin-bottom: 10px; }
.exercise-top .desc code {
  background: var(--surface2); padding: 1px 6px; border-radius: 4px;
  font-family: var(--mono); font-size: 13px;
}
.exercise-top .desc pre {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; font-family: var(--mono);
  font-size: 13px; overflow-x: auto; margin: 8px 0 12px; line-height: 1.6;
}

.expected-output {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 18px; margin-top: 12px;
}
.expected-output h4 { font-size: 13px; color: var(--green); margin-bottom: 6px; }
.expected-output pre {
  font-family: var(--mono); font-size: 13px; color: var(--text2);
  white-space: pre-wrap; margin: 0; background: none; border: none; padding: 0;
}

/* ── Editor Area ── */
.editor-area {
  flex: 1; display: flex; flex-direction: column;
  border-top: 1px solid var(--border);
}
.editor-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.editor-toolbar .filename {
  font-family: var(--mono); font-size: 13px; color: var(--accent);
  background: var(--surface2); padding: 4px 12px; border-radius: 6px;
}
.toolbar-btn {
  padding: 5px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); cursor: pointer; font-size: 12px;
  font-family: var(--font); transition: all .15s;
}
.toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
.toolbar-btn.primary { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }
.toolbar-btn.primary:hover { background: #4cc960; }
.toolbar-btn.hint-btn { border-color: var(--orange); color: var(--orange); }
.toolbar-btn.hint-btn:hover { background: rgba(240,136,62,.1); }
.toolbar-spacer { flex: 1; }

.editor-container { flex: 1; display: flex; position: relative; }
textarea.code-editor {
  flex: 1; background: var(--bg); color: var(--text);
  border: none; padding: 20px; padding-left: 60px;
  font-family: var(--mono); font-size: 14px;
  line-height: 1.7; tab-size: 4; resize: none; outline: none;
  min-height: 400px;
}
textarea.code-editor::placeholder { color: var(--surface3); }

.line-numbers {
  position: absolute; left: 0; top: 0; bottom: 0; width: 48px;
  background: var(--surface); border-right: 1px solid var(--border);
  padding: 20px 0; font-family: var(--mono); font-size: 14px;
  line-height: 1.7; color: var(--text2); text-align: right;
  user-select: none; overflow: hidden; pointer-events: none;
}
.line-numbers div { padding-right: 12px; }

/* ── Panels (hints, solution, compile) ── */
.panel {
  display: none; border-top: 1px solid var(--border);
  background: var(--surface); padding: 16px 20px;
  font-size: 14px; max-height: 500px; overflow-y: auto;
}
.panel.visible { display: block; animation: fadeIn .2s; }
.panel h4 { margin-bottom: 8px; }
.panel pre {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; font-family: var(--mono);
  font-size: 13px; line-height: 1.6; overflow-x: auto;
  margin: 8px 0;
}
.panel .hint-item {
  padding: 10px 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 8px; cursor: pointer;
}
.hint-item .hint-label { color: var(--orange); font-weight: 600; font-size: 13px; }
.hint-item .hint-content { display: none; margin-top: 8px; font-size: 13px; line-height: 1.7; }
.hint-item.open .hint-content { display: block; }

.compile-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; font-family: var(--mono); font-size: 13px;
  margin: 8px 0; display: flex; align-items: center; gap: 10px;
}
.compile-box code { color: var(--cyan); flex: 1; }
.compile-box button {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); padding: 4px 12px; border-radius: 6px;
  cursor: pointer; font-size: 12px;
}
.compile-box button:hover { border-color: var(--accent); }

.solution-code { position: relative; }
.solution-code .copy-btn {
  position: absolute; top: 8px; right: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); padding: 3px 10px; border-radius: 6px;
  cursor: pointer; font-size: 11px;
}
.solution-code .copy-btn:hover { color: var(--text); border-color: var(--accent); }

/* ── Nav buttons ── */
.nav-buttons {
  display: flex; gap: 12px; padding: 20px 40px;
  border-top: 1px solid var(--border); background: var(--surface);
}
.nav-btn {
  padding: 10px 24px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-size: 14px; font-family: var(--font); transition: all .15s;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.next { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; margin-left: auto; }
.nav-btn.next:hover { background: #79bbff; }
.nav-btn.done-btn { background: var(--green); color: #000; border-color: var(--green); font-weight: 600; }

/* ── Responsive ── */
@media (max-width: 768px) {
  nav { transform: translateX(-100%); }
  nav.open { transform: translateX(0); }
  .menu-btn { display: flex; align-items: center; justify-content: center; }
  main { margin-left: 0; }
  .exercise-top { padding: 60px 16px 20px; }
  .nav-buttons { padding: 16px; }
}
</style>
</head>
<body>

<button class="menu-btn" onclick="document.querySelector('nav').classList.toggle('open')">&#9776;</button>

<nav>

<script>

const EX = [

  title: "スレッドを作る",

  starterCode: `#include <pthread.h>

{

\t{

\t\ti++;
\t}

\t{

\t\ti++;
\t}

\treturn (0);

  hints: [
    { label: "Hint 1: pthread_create の引数", content: "<code>pthread_create(&threads[i], NULL, routine, &data[i])</code><br>第4引数で各スレッド専用の構造体のアドレスを渡す。" },
    { label: "Hint 2: routine 内のキャスト", content: "<code>t_data *d = (t_data *)arg;</code><br><code>printf(\"Thread %d started\\n\", d->id);</code>" }
  ],
  solution: `#include <pthread.h>
#include <stdio.h>

typedef struct s_data
{
\tint\tid;
}\tt_data;

void\t*routine(void *arg)
{
\tt_data\t*d;

\td = (t_data *)arg;
\tprintf("Thread %d started\\n", d->id);
\treturn (NULL);
}

int\tmain(void)
{
\tpthread_t\tthreads[2];
\tt_data\t\tdata[2];
\tint\t\t\ti;

\ti = 0;
\twhile (i < 2)
\t{
\t\tdata[i].id = i + 1;
\t\tpthread_create(&threads[i], NULL, routine, &data[i]);
\t\ti++;
\t}
\ti = 0;
\twhile (i < 2)
\t{
\t\tpthread_join(threads[i], NULL);
\t\ti++;
\t}
\tprintf("All threads done\\n");
\treturn (0);
}`,
  compileCmd: "cc -Wall -Wextra -Werror -o ex00 ex00_thread.c -lpthread && ./ex00"

// ─── Ex 1 ───
{
  title: "データレースを観察する",
  difficulty: 1,
  filename: "ex01_race.c",
  objective: "mutex なしで共有変数にアクセスし、データレースの影響を実際に確認する。",
  description: `<p>2つのスレッドが同じカウンタを 1,000,000 回ずつインクリメントするプログラムを書け。</p>

  <li>グローバル変数 <code>counter</code> を 0 で初期化</li>

  <li><b>mutex は使わない</b> (データレースを意図的に起こす)</li>
</ul>
<p>期待: 正しければ 2,000,000 になるはずだが、データレースにより<b>毎回異なる値</b>が出る。</p>`,
  expectedOutput: `Counter = 1532847  (実行するたびに値が変わる。2000000 にならない)`,
  starterCode: `#include <pthread.h>
#include <stdio.h>

int\tcounter = 0;

void\t*increment(void *arg)
{

\t(void)arg;
\ti = 0;
\twhile (i < 1000000)
\t{
\t\t// TODO: counter をインクリメント
\t\ti++;
\t}
\treturn (NULL);
}

int\tmain(void)
{
\tpthread_t\tt1;
\tpthread_t\tt2;

\t// TODO: 2つのスレッドを作成して join し、counter を出力
\tprintf("Counter = %d\\n", counter);
\treturn (0);
}`,
  hints: [
    { label: "Hint 1: 何度も実行してみる", content: "コンパイルして5回ほど実行してみよう。毎回異なる値が出るはず。<br><code>for i in $(seq 1 5); do ./ex01; done</code>" },
    { label: "Hint 2: TSan で確認", content: "<code>cc -fsanitize=thread -g -o ex01 ex01_race.c -lpthread</code><br>で実行すると WARNING が出る。これがデータレース。" }
  ],
  solution: `#include <pthread.h>
#include <stdio.h>

int\tcounter = 0;

void\t*increment(void *arg)
{
\tint\ti;

\t(void)arg;
\ti = 0;
\twhile (i < 1000000)
\t{
\t\tcounter++;
\t\ti++;
\t}
\treturn (NULL);
}

int\tmain(void)
{
\tpthread_t\tt1;
\tpthread_t\tt2;

\tpthread_create(&t1, NULL, increment, NULL);
\tpthread_create(&t2, NULL, increment, NULL);

\tpthread_join(t2, NULL);
\tprintf("Counter = %d\\n", counter);
\treturn (0);
}`,

// ─── Ex 2 ───
{
  title: "Mutex でデータレースを修正",
  difficulty: 1,
  filename: "ex02_mutex.c",
  objective: "Ex01 のデータレースを mutex で保護し、正しい結果 (2,000,000) を毎回得る。",
  description: `<p>Ex01 のプログラムに mutex を追加して、<code>counter</code> が正確に 2,000,000 になるようにせよ。</p>

  expectedOutput: `Counter = 2000000  (毎回同じ値)`,
  starterCode: `#include <pthread.h>

{

}\tt_data;

void\t*increment(void *arg)
{

\tpthread_t\t\tthreads[2];
\tpthread_mutex_t\tmutex;
\tint\t\t\t\tcounter;
\tt_data\t\t\tdata[2];
\tint\t\t\t\ti;

\tcounter = 0;
\t// TODO: mutex を初期化
\t// TODO: data[i] に counter と mutex のポインタを設定
\t// TODO: スレッド2つ生成、join、結果表示、mutex 破棄

}`,
  hints: [
    { label: "Hint 1: mutex の初期化", content: "<code>pthread_mutex_init(&mutex, NULL);</code>" },
    { label: "Hint 2: ロックの位置", content: "<pre>pthread_mutex_lock(d->mutex);\n(*(d->counter))++;\npthread_mutex_unlock(d->mutex);</pre>" },
    { label: "Hint 3: data の設定", content: "<pre>data[i].counter = &counter;\ndata[i].mutex = &mutex;</pre>" }
  ],
  solution: `#include <pthread.h>
#include <stdio.h>

typedef struct s_data
{
\tint\t\t\t\t*counter;
\tpthread_mutex_t\t*mutex;
}\tt_data;

void\t*increment(void *arg)
{
\tt_data\t*d;
\tint\t\ti;

\td = (t_data *)arg;
\ti = 0;
\twhile (i < 1000000)
\t{
\t\tpthread_mutex_lock(d->mutex);
\t\t(*(d->counter))++;
\t\tpthread_mutex_unlock(d->mutex);
\t\ti++;
\t}
\treturn (NULL);
}

int\tmain(void)
{
\tpthread_t\t\tthreads[2];
\tpthread_mutex_t\tmutex;
\tint\t\t\t\tcounter;
\tt_data\t\t\tdata[2];
\tint\t\t\t\ti;

\tcounter = 0;
\tpthread_mutex_init(&mutex, NULL);
\ti = 0;
\twhile (i < 2)
\t{
\t\tdata[i].counter = &counter;
\t\tdata[i].mutex = &mutex;
\t\tpthread_create(&threads[i], NULL, increment, &data[i]);
\t\ti++;
\t}
\ti = 0;
\twhile (i < 2)
\t{
\t\tpthread_join(threads[i], NULL);
\t\ti++;
\t}
\tprintf("Counter = %d\\n", counter);
\tpthread_mutex_destroy(&mutex);
\treturn (0);
}`,

  difficulty: 2,
  filename: "ex03_deadlock.c",
  objective: "2つの mutex を逆順に lock してデッドロックを意図的に発生させ、その後修正する。",
  description: `<p>2つのスレッドが2つの mutex をロックするプログラムを書け。</p>
<p><b>Step 1 (デッドロック版):</b></p>

  <li>スレッド1: mutex_a をロック → mutex_b をロック</li>
  <li>スレッド2: mutex_b をロック → mutex_a をロック</li>
  <li>実行するとプログラムが停止する (デッドロック)</li>
</ul>
<p><b>Step 2 (修正版):</b></p>
<ul>
  <li>両スレッドとも mutex_a → mutex_b の順でロックする (リソース順序付け)</li>
  <li>プログラムが正常に終了する</li>
</ul>
<p>まずデッドロック版を書いて体験し、その後修正せよ。</p>`,
  expectedOutput: `=== デッドロック版 ===
(プログラムがハングする。Ctrl+C で停止)

=== 修正版 ===
Thread 1: locked both
Thread 2: locked both
Done`,
  starterCode: `#include <pthread.h>
#include <stdio.h>
#include <unistd.h>

pthread_mutex_t\tmutex_a;
pthread_mutex_t\tmutex_b;

void\t*thread1_routine(void *arg)

function showEx(i) {
  S.current = i;
  document.querySelectorAll('.exercise').forEach((el, j) => el.classList.toggle('active', j === i));
  document.querySelectorAll('nav li a').forEach((a, j) => a.classList.toggle('active', j === i));
  updateLineNumbers(i);
  window.scrollTo(0, 0);
}

function updateNav() {
  const total = EX.length;
  const done = Object.keys(S.done).length;
  document.getElementById('pl').textContent = `${done} / ${total}`;
  document.getElementById('pf').style.width = `${(done/total*100).toFixed(0)}%`;
  EX.forEach((_, i) => {
    const sn = document.getElementById(`sn-${i}`);
    if (sn) sn.classList.toggle('done', S.isDone(i));
  });
}

// =========================================================================
//  EDITOR
// =========================================================================
function onEdit(i) {
  const editor = document.getElementById(`editor-${i}`);
  S.saveCode(i, editor.value);
  updateLineNumbers(i);
}

function updateLineNumbers(i) {
  const editor = document.getElementById(`editor-${i}`);
  const ln = document.getElementById(`ln-${i}`);
  if (!editor || !ln) return;
  const lines = editor.value.split('\n').length;
  ln.innerHTML = Array.from({length: lines}, (_, j) => `<div>${j+1}</div>`).join('');
}

function syncScroll(i) {
  const editor = document.getElementById(`editor-${i}`);
  const ln = document.getElementById(`ln-${i}`);
  if (ln) ln.style.transform = `translateY(-${editor.scrollTop}px)`;
}

function togglePanel(i, name) {
  const panel = document.getElementById(`${name}-${i}`);
  ['hints','compile','solution'].forEach(n => {
    const p = document.getElementById(`${n}-${i}`);
    if (p && n !== name) p.classList.remove('visible');
  });
  panel.classList.toggle('visible');
}

function copyCode(i) {
  const editor = document.getElementById(`editor-${i}`);
  navigator.clipboard.writeText(editor.value).then(() => notify('Copied!'));
}

function copySolution(i) {
  navigator.clipboard.writeText(EX[i].solution).then(() => notify('Solution copied!'));
}

function copyText(t) {
  navigator.clipboard.writeText(t).then(() => notify('Copied!'));
}

function markDone(i) {
  S.markDone(i);
  if (i < EX.length - 1) showEx(i + 1);
}

function notify(msg) {
  const d = document.createElement('div');
  d.textContent = msg;
  Object.assign(d.style, {
    position:'fixed',bottom:'20px',right:'20px',background:'var(--green)',color:'#000',
    padding:'8px 20px',borderRadius:'8px',fontWeight:'600',fontSize:'14px',zIndex:'999',
    animation:'fadeIn .2s'
  });
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 1500);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// Tab support in textarea
document.addEventListener('keydown', e => {
  if (e.target.classList.contains('code-editor') && e.key === 'Tab') {
    e.preventDefault();
    const t = e.target, s = t.selectionStart, end = t.selectionEnd;
    t.value = t.value.substring(0, s) + '\t' + t.value.substring(end);
    t.selectionStart = t.selectionEnd = s + 1;
    const i = parseInt(t.id.split('-')[1]);
    S.saveCode(i, t.value);
    updateLineNumbers(i);
  }
});

buildAll();
</script>
