<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philosophers -- 演習問題集</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #58a6ff;
  --accent2: #3fb950;
  --warn: #f0883e;
  --err: #f85149;
  --correct: #238636;
  --wrong: #da3633;
  --code-bg: #0d1117;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
nav {
  width: 280px;
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  transition: transform .3s;
}
nav h1 {
  font-size: 16px;
  padding: 0 20px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--accent);
  letter-spacing: .5px;
}
nav .progress-bar {
  margin: 12px 20px;
  background: var(--border);
  border-radius: 4px;
  height: 6px;
  overflow: hidden;
}
nav .progress-fill {
  height: 100%;
  background: var(--accent2);
  border-radius: 4px;
  transition: width .4s;
  width: 0%;
}
nav .progress-text {
  font-size: 12px;
  color: var(--text2);
  padding: 0 20px 8px;
}
nav ul { list-style: none; }
nav li a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 20px;
  color: var(--text2);
  text-decoration: none;
  font-size: 14px;
  transition: all .15s;
  border-left: 3px solid transparent;
}
nav li a:hover { background: var(--surface2); color: var(--text); }
nav li a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(88,166,255,.08); }
nav li a .badge {
  margin-left: auto;
  font-size: 11px;
  padding: 1px 8px;
  border-radius: 10px;
  background: var(--border);
  color: var(--text2);
}
nav li a .badge.done { background: var(--correct); color: #fff; }
nav .sep { height: 1px; background: var(--border); margin: 8px 20px; }

.menu-btn {
  display: none;
  position: fixed;
  top: 12px; left: 12px;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  width: 40px; height: 40px;
  border-radius: 8px;
  font-size: 20px;
  cursor: pointer;
}

/* ── Main ── */
main {
  margin-left: 280px;
  flex: 1;
  max-width: 860px;
  padding: 40px 48px 120px;
}

section {
  display: none;
  animation: fadeIn .3s;
}
section.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

h2 {
  font-size: 28px;
  margin-bottom: 8px;
  color: var(--text);
}
h2 .chapter-num { color: var(--accent); font-weight: 400; }
.section-desc {
  color: var(--text2);
  margin-bottom: 32px;
  font-size: 15px;
  border-left: 3px solid var(--accent);
  padding-left: 14px;
}

/* ── Problem Card ── */
.problem {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 24px;
  overflow: hidden;
}
.problem-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
}
.problem-num {
  background: var(--accent);
  color: #000;
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
}
.problem-num.solved { background: var(--accent2); }
.problem-title { font-weight: 600; font-size: 15px; }
.difficulty {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 10px;
  font-weight: 600;
}
.difficulty.easy { background: rgba(63,185,80,.15); color: var(--accent2); }
.difficulty.medium { background: rgba(240,136,62,.15); color: var(--warn); }
.difficulty.hard { background: rgba(248,81,73,.15); color: var(--err); }

.problem-body { padding: 20px; }
.problem-body p { margin-bottom: 12px; font-size: 15px; }

pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 12px 0;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.6;
  tab-size: 4;
}
code { font-family: var(--mono); font-size: 13px; }
.inline-code {
  background: var(--surface2);
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 13px;
}

/* ── Choices (single/multi) ── */
.choices { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
.choice {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
  font-size: 14px;
}
.choice:hover { border-color: var(--accent); }
.choice.selected { border-color: var(--accent); background: rgba(88,166,255,.08); }
.choice.correct-answer { border-color: var(--accent2); background: rgba(63,185,80,.1); }
.choice.wrong-answer { border-color: var(--err); background: rgba(248,81,73,.08); opacity: .7; }
.choice-marker {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  transition: all .15s;
}
.choice.selected .choice-marker { border-color: var(--accent); background: var(--accent); color: #000; }
.choice.correct-answer .choice-marker { border-color: var(--accent2); background: var(--accent2); color: #fff; }
.choice.wrong-answer .choice-marker { border-color: var(--err); background: var(--err); color: #fff; }

/* ── Code fill / free text ── */
.code-input {
  font-family: var(--mono);
  font-size: 14px;
  background: var(--code-bg);
  border: 1px solid var(--border);
  color: var(--accent);
  padding: 6px 12px;
  border-radius: 6px;
  min-width: 180px;
  outline: none;
}
.code-input:focus { border-color: var(--accent); }
.code-input.correct { border-color: var(--accent2); color: var(--accent2); }
.code-input.wrong { border-color: var(--err); color: var(--err); }

/* ── Buttons ── */
.btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  font-family: var(--font);
  transition: all .15s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { background: #79bbff; }

/* ── Explanation ── */
.explanation {
  display: none;
  margin-top: 16px;
  padding: 16px 20px;
  background: rgba(63,185,80,.06);
  border: 1px solid rgba(63,185,80,.2);
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.8;
}
.explanation.visible { display: block; animation: fadeIn .3s; }
.explanation h4 { color: var(--accent2); margin-bottom: 6px; }
.explanation.wrong-exp {
  background: rgba(248,81,73,.06);
  border-color: rgba(248,81,73,.2);
}
.explanation.wrong-exp h4 { color: var(--err); }

/* ── Ordering ── */
.ordering-list { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
.ordering-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: grab;
  font-size: 14px;
  user-select: none;
}
.ordering-item:active { cursor: grabbing; }
.ordering-item .order-num {
  background: var(--border);
  color: var(--text2);
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.ordering-item.correct-pos .order-num { background: var(--accent2); color: #fff; }
.ordering-item.wrong-pos .order-num { background: var(--err); color: #fff; }
.order-arrows { display: flex; flex-direction: column; gap: 2px; margin-left: auto; }
.order-arrows button {
  background: none; border: none; color: var(--text2);
  cursor: pointer; font-size: 14px; padding: 0 4px;
  line-height: 1;
}
.order-arrows button:hover { color: var(--accent); }

/* ── Scenario ── */
.scenario-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  margin: 12px 0;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.8;
  white-space: pre-wrap;
}

/* ── Result Banner ── */
.result-banner {
  display: none;
  padding: 10px 16px;
  border-radius: 8px;
  margin-top: 12px;
  font-weight: 600;
  font-size: 14px;
}
.result-banner.show { display: flex; align-items: center; gap: 8px; }
.result-banner.pass { background: rgba(63,185,80,.12); color: var(--accent2); border: 1px solid rgba(63,185,80,.3); }
.result-banner.fail { background: rgba(248,81,73,.1); color: var(--err); border: 1px solid rgba(248,81,73,.3); }

/* ── Responsive ── */
@media (max-width: 900px) {
  nav { transform: translateX(-100%); }
  nav.open { transform: translateX(0); }
  .menu-btn { display: flex; align-items: center; justify-content: center; }
  main { margin-left: 0; padding: 60px 20px 100px; }
}

.highlight { color: var(--warn); }
.kw { color: #ff7b72; }
.fn { color: #d2a8ff; }
.str { color: #a5d6ff; }
.cmt { color: #8b949e; font-style: italic; }
.num { color: #79c0ff; }
.type { color: #ff7b72; }
</style>
</head>
<body>

<button class="menu-btn" onclick="document.querySelector('nav').classList.toggle('open')">&#9776;</button>

<nav id="sidebar">
  <h1>Philosophers 演習</h1>
  <div class="progress-text" id="progress-text">0 / 0 完了</div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <ul id="nav-list"></ul>
</nav>

<main id="main-content"></main>

<script>
// ===================================================================
//  DATA: All problems
// ===================================================================
const sections = [
{
  id: "thread-basics",
  title: "1. スレッドの基礎",
  desc: "pthread API の基本を理解し、スレッドの生成・合流・引数渡しを正確に把握する。",
  problems: [
  {
    title: "pthread_create の引数",
    difficulty: "easy",
    type: "choice",
    body: `<p><span class="inline-code">pthread_create</span> の第3引数に渡す関数のシグネチャとして正しいものはどれか。</p>`,
    choices: [
      "void routine(void *arg)",
      "void *routine(void *arg)",
      "int routine(void *arg)",
      "void *routine(int arg)"
    ],
    answer: 1,
    explanation: `<code>pthread_create</code> の第3引数は <code>void *(*)(void *)</code> 型の関数ポインタ。<br>
      つまり <code>void *</code> を受け取り <code>void *</code> を返す関数。<br>
      <code>void *routine(void *arg)</code> がこのシグネチャに一致する。<br><br>
      他の選択肢は戻り値の型 (<code>void</code>, <code>int</code>) や引数の型 (<code>int</code>) が異なるためコンパイルエラーまたは未定義動作になる。`
  },
  {
    title: "スレッドへの引数渡し -- バグ探し",
    difficulty: "medium",
    type: "choice",
    body: `<p>以下のコードのバグを指摘せよ。</p>
<pre><span class="type">int</span> main(<span class="type">void</span>)
{
    <span class="type">pthread_t</span>  threads[<span class="num">5</span>];
    <span class="type">int</span>        i;

    i = <span class="num">0</span>;
    <span class="kw">while</span> (i &lt; <span class="num">5</span>)
    {
        <span class="fn">pthread_create</span>(&threads[i], NULL, routine, &i);
        i++;
    }
    i = <span class="num">0</span>;
    <span class="kw">while</span> (i &lt; <span class="num">5</span>)
        <span class="fn">pthread_join</span>(threads[i++], NULL);
    <span class="kw">return</span> (<span class="num">0</span>);
}</pre>`,
    choices: [
      "pthread_join を呼ぶ前に全スレッドが終了してしまう",
      "ループ変数 i のアドレスを渡しているため、スレッドが読む時点で i の値が変化している",
      "pthread_create の第2引数に NULL を渡してはいけない",
      "threads 配列がスタック上にあるため、スレッドからアクセスできない"
    ],
    answer: 1,
    explanation: `<code>&i</code> を渡すと、全スレッドが同じアドレスを参照する。しかしメインスレッドのループで <code>i</code> はインクリメントされ続ける。<br><br>
      スレッドが <code>*(int *)arg</code> を読む頃には <code>i</code> は既に次の値 (あるいは 5) に変わっている可能性がある。<br><br>
      <b>正しい方法:</b> 各スレッド専用の構造体を用意し、そのアドレスを渡す。<br>
<pre>t_philo philos[5];
philos[i].id = i;
pthread_create(&threads[i], NULL, routine, &philos[i]);</pre>`
  },
  {
    title: "join vs detach",
    difficulty: "easy",
    type: "choice",
    body: `<p>Philosophers 課題では <code>pthread_join</code> と <code>pthread_detach</code> のどちらを使うべきか、またその理由は？</p>`,
    choices: [
      "detach -- スレッドのリソース管理が自動化されるため効率的",
      "join -- 全スレッドの終了を待ってからリソースを解放する必要があるため",
      "両方使う -- 哲学者スレッドは detach、モニタースレッドは join",
      "どちらでも同じ結果になる"
    ],
    answer: 1,
    explanation: `<code>pthread_join</code> を使う理由:<br>
      <b>1.</b> 全哲学者スレッドが終了してから mutex の destroy / メモリ解放を行う必要がある。<br>
      <b>2.</b> detach すると、スレッドがまだ mutex を使用中に main が先にリソースを解放してしまう危険がある。<br>
      <b>3.</b> join しないとスレッドのリソース (スタック等) がリークする。<br><br>
      detach は「スレッドの終了を待つ必要がない」場合に使うもので、この課題のようにシミュレーション終了後にクリーンアップが必要なケースには不適切。`
  },
  {
    title: "スレッドで共有されるもの",
    difficulty: "easy",
    type: "multi",
    body: `<p>同一プロセス内のスレッド間で<b>共有される</b>ものを全て選べ。</p>`,
    choices: [
      "ヒープ (malloc で確保した領域)",
      "スタック (ローカル変数)",
      "グローバル変数",
      "ファイルディスクリプタ",
      "レジスタ (プログラムカウンタ等)",
      "static 変数"
    ],
    answer: [0, 2, 3, 5],
    explanation: `<b>共有されるもの:</b> ヒープ、グローバル変数、ファイルディスクリプタ、static変数<br>
      <b>共有されないもの:</b> スタック (各スレッド固有)、レジスタ (各スレッド固有)<br><br>
      Philosophers 課題では構造体を <code>malloc</code> でヒープに確保し、ポインタを各スレッドに渡す。そのため構造体のフィールド (例: <code>last_meal_time</code>) は全スレッドからアクセス可能であり、mutex による保護が必要になる。`
  }
  ]
},
{
  id: "mutex-basics",
  title: "2. Mutex の基礎",
  desc: "Mutex のライフサイクル、正しい使い方、よくある誤用パターンを理解する。",
  problems: [
  {
    title: "Mutex のライフサイクル -- 並べ替え",
    difficulty: "easy",
    type: "ordering",
    body: `<p>Mutex の操作を正しい順序に並べ替えよ。</p>`,
    items: [
      "pthread_mutex_unlock",
      "pthread_mutex_init",
      "pthread_mutex_lock",
      "pthread_mutex_destroy",
      "共有変数を読み書き"
    ],
    correctOrder: [1, 2, 4, 0, 3],
    explanation: `正しい順序:<br>
      <b>1.</b> <code>init</code> -- 使用前に必ず初期化<br>
      <b>2.</b> <code>lock</code> -- クリティカルセクションに入る<br>
      <b>3.</b> <code>共有変数を読み書き</code> -- ロック中に操作<br>
      <b>4.</b> <code>unlock</code> -- クリティカルセクションを抜ける<br>
      <b>5.</b> <code>destroy</code> -- 全スレッド終了後に破棄<br><br>
      init と destroy はプログラムのライフタイムで1回、lock/unlock は何度も繰り返す。`
  },
  {
    title: "バグ探し -- unlock 漏れ",
    difficulty: "medium",
    type: "choice",
    body: `<p>以下のコードにはバグがある。どれか。</p>
<pre><span class="type">int</span> <span class="fn">check_death</span>(<span class="type">t_philo</span> *philo)
{
    <span class="fn">pthread_mutex_lock</span>(&philo->data->meal_mutex);
    <span class="kw">if</span> (<span class="fn">get_time_ms</span>() - philo->last_meal_time
        > philo->data->time_to_die)
        <span class="kw">return</span> (<span class="num">1</span>); <span class="cmt">// 死亡</span>
    <span class="fn">pthread_mutex_unlock</span>(&philo->data->meal_mutex);
    <span class="kw">return</span> (<span class="num">0</span>);
}</pre>`,
    choices: [
      "get_time_ms() を mutex の外で呼ぶべき",
      "return (1) の前に unlock を呼んでいない -- mutex が永久にロックされる",
      "meal_mutex ではなく death_mutex を使うべき",
      "last_meal_time は mutex 保護不要"
    ],
    answer: 1,
    explanation: `死亡判定が真の場合、<code>return (1)</code> で関数を抜けるが、その前に <code>pthread_mutex_unlock</code> を呼んでいない。<br><br>
      <b>結果:</b> <code>meal_mutex</code> がロックされたまま解放されない。他のスレッドが <code>meal_mutex</code> を lock しようとすると永久にブロックされる (実質デッドロック)。<br><br>
<b>修正:</b>
<pre>if (get_time_ms() - philo->last_meal_time > philo->data->time_to_die)
{
    pthread_mutex_unlock(&philo->data->meal_mutex);
    return (1);
}
pthread_mutex_unlock(&philo->data->meal_mutex);
return (0);</pre>`
  },
  {
    title: "読み取りだけなら mutex は不要？",
    difficulty: "medium",
    type: "choice",
    body: `<p>あるスレッドが共有変数を<b>読むだけ</b>の場合、mutex で保護する必要はあるか。</p>
<pre><span class="cmt">// モニタースレッド (読み取りのみ)</span>
<span class="kw">if</span> (philo->last_meal_time + data->time_to_die &lt; <span class="fn">get_time_ms</span>())
    <span class="cmt">// 死亡判定</span>

<span class="cmt">// 哲学者スレッド (書き込み)</span>
<span class="fn">pthread_mutex_lock</span>(&data->meal_mutex);
philo->last_meal_time = <span class="fn">get_time_ms</span>();
<span class="fn">pthread_mutex_unlock</span>(&data->meal_mutex);</pre>`,
    choices: [
      "不要 -- 読み取りだけなのでデータが壊れることはない",
      "必要 -- 読み取りでもデータレースになり、C言語では未定義動作",
      "volatile をつければ不要",
      "int 型であればアトミックなので不要"
    ],
    answer: 1,
    explanation: `<b>必要。</b> データレースの定義は:<br>
      &nbsp;1. 複数スレッドが同じメモリにアクセス<br>
      &nbsp;2. 少なくとも1つが書き込み<br>
      &nbsp;3. 同期されていない<br><br>
      読み取り側が mutex を使わなければ条件3を満たし、<b>未定義動作</b>になる。<br><br>

// ===================================================================
//  STATE
// ===================================================================
const state = {
  currentSection: 0,
  solved: {},
  init() {
    try { this.solved = JSON.parse(localStorage.getItem('philo_solved') || '{}'); } catch(e) {}
  },
  markSolved(key) {
    this.solved[key] = true;
    localStorage.setItem('philo_solved', JSON.stringify(this.solved));
    updateProgress();
  },
  isSolved(key) { return !!this.solved[key]; },
  reset() { this.solved = {}; localStorage.removeItem('philo_solved'); updateProgress(); render(); }
};

// ===================================================================
//  RENDER
// ===================================================================
function render() {
  renderNav();
  renderSections();
  showSection(state.currentSection);
  updateProgress();
}

function renderNav() {
  const ul = document.getElementById('nav-list');
  ul.innerHTML = '';
  sections.forEach((sec, si) => {
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = '#';
    a.textContent = sec.title;
    const solvedCount = sec.problems.filter((_, pi) => state.isSolved(`${si}-${pi}`)).length;
    const badge = document.createElement('span');
    badge.className = 'badge' + (solvedCount === sec.problems.length ? ' done' : '');
    badge.textContent = `${solvedCount}/${sec.problems.length}`;
    a.appendChild(badge);
    a.onclick = e => { e.preventDefault(); showSection(si); document.querySelector('nav').classList.remove('open'); };
    if (si === state.currentSection) a.classList.add('active');
    li.appendChild(a);
    ul.appendChild(li);
  });
  // Reset link
  const sep = document.createElement('li');
  sep.innerHTML = '<div class="sep"></div>';
  ul.appendChild(sep);
  const resetLi = document.createElement('li');
  const resetA = document.createElement('a');
  resetA.href = '#';
  resetA.textContent = 'Progress Reset';
  resetA.style.color = 'var(--err)';
  resetA.onclick = e => { e.preventDefault(); if(confirm('進捗をリセットしますか？')) state.reset(); };
  resetLi.appendChild(resetA);
  ul.appendChild(resetLi);
}

function renderSections() {
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  sections.forEach((sec, si) => {
    const section = document.createElement('section');
    section.id = sec.id;
    section.innerHTML = `<h2><span class="chapter-num">Chapter ${si+1}</span> ${sec.title.replace(/^\d+\.\s*/, '')}</h2>
      <p class="section-desc">${sec.desc}</p>`;
    sec.problems.forEach((prob, pi) => {
      section.appendChild(renderProblem(prob, si, pi));
    });
    main.appendChild(section);
  });
}

function renderProblem(prob, si, pi) {
  const key = `${si}-${pi}`;
  const div = document.createElement('div');
  div.className = 'problem';
  div.id = `prob-${key}`;
  const solved = state.isSolved(key);
  div.innerHTML = `
    <div class="problem-header">
      <div class="problem-num ${solved ? 'solved' : ''}">${pi+1}</div>
      <div class="problem-title">${prob.title}</div>
      <span class="difficulty ${prob.difficulty}">${prob.difficulty.toUpperCase()}</span>
    </div>
    <div class="problem-body">
      ${prob.body}
      <div id="interact-${key}"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="checkAnswer('${key}')">解答を確認</button>
      </div>
      <div class="result-banner" id="result-${key}"></div>
      <div class="explanation" id="exp-${key}">
        <h4>解説</h4>
        ${prob.explanation}
      </div>
    </div>`;
  setTimeout(() => renderInteraction(prob, key), 0);
  return div;
}

function renderInteraction(prob, key) {
  const container = document.getElementById(`interact-${key}`);
  if (!container) return;
  if (prob.type === 'choice' || prob.type === 'multi') {
    const isMulti = prob.type === 'multi';
    let html = `<div class="choices" data-type="${prob.type}">`;
    prob.choices.forEach((c, i) => {
      html += `<div class="choice" data-idx="${i}" onclick="toggleChoice(this, ${isMulti})">
        <div class="choice-marker">${isMulti ? '' : ''}</div>
        <div>${c}</div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  } else if (prob.type === 'fill') {
    let html = '<div style="display:flex;flex-direction:column;gap:10px;margin:12px 0">';
    prob.blanks.forEach((b, i) => {
      html += `<div style="display:flex;align-items:center;gap:10px">
        <code style="min-width:60px">${b.label}</code>
        <input class="code-input" id="fill-${key}-${i}" placeholder="${b.hint || ''}" autocomplete="off">
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  } else if (prob.type === 'ordering') {
    let items = prob.items.map((item, i) => ({text: item, origIdx: i}));
    // shuffle
    for (let i = items.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [items[i], items[j]] = [items[j], items[i]];
    }
    let html = `<div class="ordering-list" id="order-${key}">`;
    items.forEach((item, i) => {
      html += `<div class="ordering-item" data-orig="${item.origIdx}">
        <span class="order-num">${i+1}</span>
        <span>${item.text}</span>
        <div class="order-arrows">
          <button onclick="moveItem(this.closest('.ordering-item'),-1)">&#9650;</button>
          <button onclick="moveItem(this.closest('.ordering-item'),1)">&#9660;</button>
        </div>
      </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
  }
}

function toggleChoice(el, isMulti) {
  if (el.classList.contains('correct-answer') || el.classList.contains('wrong-answer')) return;
  if (!isMulti) {
    el.parentElement.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
  }
  el.classList.toggle('selected');
}

function moveItem(item, dir) {
  const list = item.parentElement;
  const items = [...list.children];
  const idx = items.indexOf(item);
  if (dir === -1 && idx > 0) list.insertBefore(item, items[idx-1]);
  else if (dir === 1 && idx < items.length-1) list.insertBefore(items[idx+1], item);
  // update numbers
  [...list.children].forEach((c, i) => c.querySelector('.order-num').textContent = i+1);
}

// ===================================================================
//  CHECK ANSWER
// ===================================================================
function checkAnswer(key) {
  const [si, pi] = key.split('-').map(Number);
  const prob = sections[si].problems[pi];
  let correct = false;
  if (prob.type === 'choice') {
    const choices = document.querySelectorAll(`#interact-${key} .choice`);
    const selected = [...choices].findIndex(c => c.classList.contains('selected'));
    correct = selected === prob.answer;
    choices.forEach((c, i) => {
      c.classList.remove('selected');
      if (i === prob.answer) c.classList.add('correct-answer');
      else if (i === selected && selected !== prob.answer) c.classList.add('wrong-answer');
    });
  } else if (prob.type === 'multi') {
    const choices = document.querySelectorAll(`#interact-${key} .choice`);
    const selected = [...choices].map((c, i) => c.classList.contains('selected') ? i : -1).filter(i => i !== -1);
    correct = JSON.stringify(selected.sort()) === JSON.stringify([...prob.answer].sort());
    choices.forEach((c, i) => {
      c.classList.remove('selected');
      if (prob.answer.includes(i)) c.classList.add('correct-answer');
      else if (selected.includes(i)) c.classList.add('wrong-answer');
    });
  } else if (prob.type === 'fill') {
    correct = true;
    prob.blanks.forEach((b, i) => {
      const input = document.getElementById(`fill-${key}-${i}`);
      const val = input.value.trim();
      const answers = Array.isArray(b.answer) ? b.answer : [b.answer];
      if (answers.some(a => val === a || val === a.replace(/;$/, ''))) {
        input.classList.add('correct');
        input.classList.remove('wrong');
      } else {
        input.classList.add('wrong');
        input.classList.remove('correct');
        correct = false;
        input.value = answers[0];
      }
      input.readOnly = true;
    });
  } else if (prob.type === 'ordering') {
    const items = [...document.querySelectorAll(`#order-${key} .ordering-item`)];
    const userOrder = items.map(el => parseInt(el.dataset.orig));
    correct = JSON.stringify(userOrder) === JSON.stringify(prob.correctOrder);
    items.forEach((el, i) => {
      if (parseInt(el.dataset.orig) === prob.correctOrder[i]) {
        el.classList.add('correct-pos');
      } else {
        el.classList.add('wrong-pos');
      }
    });
    // Show correct order
    if (!correct) {
      const list = document.getElementById(`order-${key}`);
      const sorted = prob.correctOrder.map(idx => items.find(el => parseInt(el.dataset.orig) === idx));
      sorted.forEach(el => list.appendChild(el));
      [...list.children].forEach((c, i) => {
        c.querySelector('.order-num').textContent = i+1;
        c.classList.remove('wrong-pos');
        c.classList.add('correct-pos');
      });
    }
  }
  // Result
  const banner = document.getElementById(`result-${key}`);
  banner.className = 'result-banner show ' + (correct ? 'pass' : 'fail');
  banner.textContent = correct ? 'Correct!' : 'Incorrect -- 正解を表示しました';
  // Explanation
  const exp = document.getElementById(`exp-${key}`);
  exp.className = 'explanation visible' + (correct ? '' : ' wrong-exp');
  if (correct) {
    state.markSolved(key);
    const numEl = document.querySelector(`#prob-${key} .problem-num`);
    if (numEl) numEl.classList.add('solved');
  }
  renderNav();
}

// ===================================================================
//  NAVIGATION
// ===================================================================
function showSection(idx) {
  state.currentSection = idx;
  document.querySelectorAll('section').forEach((s, i) => s.classList.toggle('active', i === idx));
  document.querySelectorAll('nav li a').forEach((a, i) => a.classList.toggle('active', i === idx));
  window.scrollTo(0, 0);
}

function updateProgress() {
  let total = 0, done = 0;
  sections.forEach((sec, si) => {
    sec.problems.forEach((_, pi) => {
      total++;
      if (state.isSolved(`${si}-${pi}`)) done++;
    });
  });
  document.getElementById('progress-text').textContent = `${done} / ${total} 完了`;
  document.getElementById('progress-fill').style.width = total ? `${(done/total*100).toFixed(0)}%` : '0%';
}

// ===================================================================
//  INIT
// ===================================================================
